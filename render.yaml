# Render.com Blueprint — CyberSim UI
#
# Deploy steps:
#   1. Push this repo to GitHub/GitLab
#   2. In Render dashboard: New → Blueprint → connect your repo
#   3. Set REACT_APP_API_URL to your backend URL:
#      e.g. https://cybersim-backend.onrender.com
#
# Hosted as a free static site on Render's CDN — no sleeping, instant loads.
# REACT_APP_API_URL is baked into the JS bundle at build time.

services:
  - type: web
    name: cybersim-ui
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_SCENARIO_SLUG
        value: cso
      - key: REACT_APP_API_URL
        sync: false # Set this in the Render dashboard to your backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /static/*
        name: Cache-Control
        value: 'public, max-age=31536000, immutable'
      - path: /index.html
        name: Cache-Control
        value: 'no-cache, no-store, must-revalidate'
